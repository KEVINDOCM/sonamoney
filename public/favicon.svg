<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00B9A7"/>
      <stop offset="100%" stop-color="#005C54"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="32" height="32" rx="8"/>
    </clipPath>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#g)"/>
  <g clip-path="url(#clip)">
    <!-- S letter -->
    <text x="16" y="22" font-family="Georgia, serif" font-size="20" font-weight="bold"
      fill="white" text-anchor="middle">S</text>
    <!-- Trend line -->
    <polyline points="5,25 9,18 13,21 20,13 27,7"
      stroke="white" stroke-width="2"
      fill="none" stroke-linecap="round" stroke-linejoin="round"
      opacity="0.9"/>
    <!-- Arrowhead -->
    <polygon points="27,7 22,10 25,14" fill="white" opacity="0.9"/>
  </g>
</svg>
